# Generated by Gabo (https://github.com/ashishb/gabo)
---
name: Test Go

on:  # yamllint disable-line rule:truthy
  push:
    branches: [main, master]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "Makefile"
      - "examples/reverse-proxy/detector/README.md"
      - "schemas/detector-output.schema.json"
      - "examples/reverse-proxy/Caddyfile"
      - "examples/reverse-proxy/**/*.html"
      - ".github/workflows/test-go.yaml"
  pull_request:
    branches: [main, master]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "Makefile"
      - "examples/reverse-proxy/detector/README.md"
      - "schemas/detector-output.schema.json"
      - "examples/reverse-proxy/Caddyfile"
      - "examples/reverse-proxy/**/*.html"
      - ".github/workflows/test-go.yaml"


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Ref: https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/controlling-permissions-for-github_token
permissions:
  contents: read

jobs:

  # Run it locally with https://github.com/nektos/act
  # act -j testGo
  testGo:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      matrix:
        # Without quotes, 1.20 becomes 1.2!
        go-version: ["1.25.11"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v6.4.0
        with:
          go-version: ${{ matrix.go-version }}

      # Ref: https://github.com/actions/cache/blob/main/examples.md#go---modules
      # Warning: This is Linux specific
      - uses: actions/cache@v6
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Run full test suite
        run: make check
