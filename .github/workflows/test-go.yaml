# Generated by Gabo (https://github.com/ashishb/gabo)
---
name: Test Go

on:  # yamllint disable-line rule:truthy
  push:
    branches: [main, master]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/test-go.yaml"
  pull_request:
    branches: [main, master]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/test-go.yaml"


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Ref: https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/controlling-permissions-for-github_token
permissions:
  contents: read

jobs:

  # Run it locally with https://github.com/nektos/act
  # act -j testGo
  testGo:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      matrix:
        # Without quotes, 1.20 becomes 1.2!
        go-version: ["1.25.11"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}

      # Ref: https://github.com/actions/cache/blob/main/examples.md#go---modules
      # Warning: This is Linux specific
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-


      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Cache packaged runtime tools
        uses: actions/cache@v5
        with:
          path: ~/.local/bin
          key: ${{ runner.os }}-runtime-tools-eget-1.3.4-v1

      - name: Install packaged runtime tools
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euxo pipefail
          mkdir -p "$HOME/.local/bin"
          export GOBIN="$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

          retry() {
            local delay=2
            for attempt in 1 2 3 4; do
              "$@" && return 0
              if [ "$attempt" -eq 4 ]; then
                return 1
              fi
              sleep "$delay"
              delay=$((delay * 2))
            done
          }

          install_eget_tool() {
            local tool="$1"
            shift
            if [ ! -x "$HOME/.local/bin/$tool" ]; then
              retry "$HOME/.local/bin/eget" "$@" --to "$HOME/.local/bin/$tool"
            fi
          }

          if [ ! -x "$HOME/.local/bin/eget" ]; then
            retry go install github.com/zyedidia/eget@v1.3.4
          fi

          install_eget_tool landrun Zouuup/landrun
          install_eget_tool deno denoland/deno --asset x86_64-unknown-linux-gnu.zip --asset '^denort'
          install_eget_tool sops getsops/sops --asset linux.amd64 --asset '^sbom'
          install_eget_tool age FiloSottile/age --asset linux-amd64 --asset '^proof' --file age
          install_eget_tool age-keygen FiloSottile/age --asset linux-amd64 --asset '^proof' --file age-keygen

          for tool in eget landrun deno sops age; do
            "$HOME/.local/bin/$tool" --version
          done

      - name: Install Debian package build dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y build-essential debhelper-compat

      - name: Verify runtime dependencies
        run: |
          set -euxo pipefail
          command -v uv
          command -v landrun

      - name: Run tests
        run: go test ./...
