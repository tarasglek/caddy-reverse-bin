version: 2

# Release note: caddy-reverse-bin v* tags trigger GoReleaser. If
# caddy-reverse-bin go.mod needs a new detectorschema version, tag
# detectorschema/vX.Y.Z first. See CONTRIBUTING.md for release process.
project_name: caddy-reverse-bin

before:
  hooks:
    - go mod tidy

builds:
  - id: caddy-reverse-bin
    main: ./cmd/caddy
    binary: caddy-reverse-bin
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: darwin
        goarch: amd64
    ldflags:
      - >-
        -s -w
        -X github.com/caddyserver/caddy/v2.CustomVersion={{ .Version }}
        -X github.com/tarasglek/caddy-reverse-bin.Version={{ .Version }}
        -X github.com/tarasglek/caddy-reverse-bin.Commit={{ .Commit }}
        -X github.com/tarasglek/caddy-reverse-bin.BuildDate={{ .Date }}

archives:
  - id: binaries
    builds:
      - caddy-reverse-bin
    formats:
      - binary
    name_template: >-
      {{ .ProjectName }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt

release:
  github:
    owner: tarasglek
    name: caddy-reverse-bin

changelog:
  use: github-native
